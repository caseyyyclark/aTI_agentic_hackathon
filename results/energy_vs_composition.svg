<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">

  <!-- Background -->
  <rect width="700" height="500" fill="white"/>

  <!-- Title -->
  <text x="350" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="bold"
        text-anchor="middle" fill="#222">Energy per Atom vs Sn Composition</text>
  <text x="350" y="52" font-family="Arial, sans-serif" font-size="11" font-style="italic"
        text-anchor="middle" fill="#555">Amorphous Ge₁₋ₓSnₓ · PBE · 216-atom supercell · single-point (NSW=0)</text>

  <!-- Plot area: x=[80,620], y=[80,420] -->
  <!-- x-axis: Sn% from 60 to 95 -->
  <!-- y-axis: E/atom from -4.62 to -4.43 eV (range 0.19 eV) -->
  <!-- y_plot = 420 - (e - (-4.62)) / 0.19 * 340
       -4.43 → y = 420 - 0.19/0.19*340 = 420-340 = 80
       -4.62 → y = 420 - 0*340 = 420
       -4.588 (66%) → y = 420 - (-4.588+4.62)/0.19*340 = 420 - 0.032/0.19*340 = 420-57.3 = 362.7 ≈ 363
       -4.520 (80%) → y = 420 - (-4.520+4.62)/0.19*340 = 420 - 0.1/0.19*340 = 420-178.9 = 241.1 ≈ 241
       -4.457 (90%) → y = 420 - (-4.457+4.62)/0.19*340 = 420 - 0.163/0.19*340 = 420-291.9 = 128.1 ≈ 128
  -->

  <!-- Axes -->
  <line x1="80" y1="80" x2="80" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="420" x2="620" y2="420" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="22" y="260" font-family="Arial" font-size="13" text-anchor="middle"
        fill="#333" transform="rotate(-90,22,260)">Energy per atom (eV/atom)</text>

  <!-- X-axis label -->
  <text x="350" y="468" font-family="Arial" font-size="13" text-anchor="middle" fill="#333">Sn fraction (%)</text>

  <!-- Y-axis ticks: -4.60 to -4.45 in steps of 0.03 -->
  <!-- y_plot for value v = 420 - (v - (-4.62)) / 0.19 * 340 = 420 + (v+4.62)/0.19*340 -->
  <!-- -4.62 → 420, -4.59 → 420-53.7=366, -4.56 → 420-107.4=313, -4.53→420-161=259, -4.50→420-214.7=205, -4.47→420-268.4=152, -4.44→420-322=98 -->
  <line x1="80" y1="420" x2="76" y2="420" stroke="#333" stroke-width="1"/>
  <text x="70" y="424" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.62</text>
  <line x1="80" y1="366" x2="76" y2="366" stroke="#333" stroke-width="1"/>
  <text x="70" y="370" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.59</text>
  <line x1="80" y1="313" x2="76" y2="313" stroke="#333" stroke-width="1"/>
  <text x="70" y="317" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.56</text>
  <line x1="80" y1="259" x2="76" y2="259" stroke="#333" stroke-width="1"/>
  <text x="70" y="263" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.53</text>
  <line x1="80" y1="205" x2="76" y2="205" stroke="#333" stroke-width="1"/>
  <text x="70" y="209" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.50</text>
  <line x1="80" y1="152" x2="76" y2="152" stroke="#333" stroke-width="1"/>
  <text x="70" y="156" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.47</text>
  <line x1="80" y1="98" x2="76" y2="98" stroke="#333" stroke-width="1"/>
  <text x="70" y="102" font-family="Arial" font-size="10" text-anchor="end" fill="#333">−4.44</text>

  <!-- Horizontal gridlines -->
  <line x1="80" y1="366" x2="620" y2="366" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="80" y1="313" x2="620" y2="313" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="80" y1="259" x2="620" y2="259" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="80" y1="205" x2="620" y2="205" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="80" y1="152" x2="620" y2="152" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="80" y1="98" x2="620" y2="98" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- X-axis ticks: same as before -->
  <line x1="80" y1="420" x2="80" y2="424" stroke="#333" stroke-width="1"/>
  <text x="80" y="436" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">60</text>
  <line x1="234" y1="420" x2="234" y2="424" stroke="#333" stroke-width="1"/>
  <text x="234" y="436" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">70</text>
  <line x1="389" y1="420" x2="389" y2="424" stroke="#333" stroke-width="1"/>
  <text x="389" y="436" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">80</text>
  <line x1="543" y1="420" x2="543" y2="424" stroke="#333" stroke-width="1"/>
  <text x="543" y="436" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">90</text>
  <line x1="620" y1="420" x2="620" y2="424" stroke="#333" stroke-width="1"/>
  <text x="620" y="436" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">95</text>

  <!-- Data points with x-coords same as before: 176 (66.2%), 390 (80.1%), 540 (89.8%) -->

  <!-- Trend line -->
  <polyline points="176,363 390,241 540,128" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Drop lines -->
  <line x1="176" y1="363" x2="176" y2="420" stroke="#2196F3" stroke-width="1.5" opacity="0.3"/>
  <line x1="390" y1="241" x2="390" y2="420" stroke="#FF5722" stroke-width="1.5" opacity="0.3"/>
  <line x1="540" y1="128" x2="540" y2="420" stroke="#4CAF50" stroke-width="1.5" opacity="0.3"/>

  <!-- Data point: Ge73Sn143 (66.2% Sn, -4.588 eV) -->
  <rect x="168" y="355" width="16" height="16" fill="#2196F3" stroke="#1565C0" stroke-width="1.2" rx="2"/>
  <text x="196" y="362" font-family="Arial" font-size="10" text-anchor="start" fill="#1565C0" font-weight="bold">−4.588 eV/atom</text>
  <text x="176" y="452" font-family="Arial" font-size="10" text-anchor="middle" fill="#1565C0">66.2%</text>

  <!-- Data point: Ge43Sn173 (80.1% Sn, -4.520 eV) -->
  <circle cx="390" cy="241" r="9" fill="#FF5722" stroke="#BF360C" stroke-width="1.2"/>
  <text x="404" y="245" font-family="Arial" font-size="10" text-anchor="start" fill="#BF360C" font-weight="bold">−4.520 eV/atom</text>
  <text x="390" y="452" font-family="Arial" font-size="10" text-anchor="middle" fill="#BF360C">80.1%</text>

  <!-- Data point: Ge22Sn194 (89.8% Sn, -4.457 eV) -->
  <polygon points="540,119 549,134 531,134" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="554" y="132" font-family="Arial" font-size="10" text-anchor="start" fill="#2E7D32" font-weight="bold">−4.457 eV/atom</text>
  <text x="540" y="452" font-family="Arial" font-size="10" text-anchor="middle" fill="#2E7D32">89.8%</text>

  <!-- Legend -->
  <rect x="90" y="90" width="210" height="74" fill="white" stroke="#ddd" stroke-width="1" rx="4"/>
  <rect x="100" y="102" width="12" height="12" fill="#2196F3" stroke="#1565C0" stroke-width="1" rx="1"/>
  <text x="118" y="113" font-family="Arial" font-size="10" fill="#333">Ge73Sn143 (66% Sn)</text>
  <circle cx="106" cy="126" r="6" fill="#FF5722" stroke="#BF360C" stroke-width="1"/>
  <text x="118" y="130" font-family="Arial" font-size="10" fill="#333">Ge43Sn173 (80% Sn)</text>
  <polygon points="106,144 112,154 100,154" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="118" y="153" font-family="Arial" font-size="10" fill="#333">Ge22Sn194 (90% Sn)</text>

  <!-- Annotation box -->
  <rect x="80" y="80" width="540" height="2" fill="none"/>
  <text x="350" y="490" font-family="Arial" font-size="9" font-style="italic" text-anchor="middle" fill="#888">
    Energy increases (less negative) with increasing Sn content; 66% Sn is most stable in this set
  </text>
</svg>
